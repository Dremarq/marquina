<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capítulo 2 - En Construcción</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0a0618; 
            background-image: radial-gradient(circle at center, #1a1e35 0%, #0a0618 100%);
            color: #ede3cc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Lato', sans-serif; 
            text-align: center; 
        }
        .container {
            background: rgba(8, 4, 22, .72);
            border: 1px solid rgba(255, 255, 255, .11);
            border-radius: 20px;
            padding: 4rem;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            /* Soft floating animation */
            animation: float 4s ease-in-out infinite alternate;
        }
        h3 {
            color: #a47449;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        h1 { 
            color: #f9c95e; 
            font-family: 'Playfair Display', serif; 
            font-size: 3rem;
            margin-bottom: 20px;
            font-style: italic;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 35px;
            color: rgba(237, 227, 204, 0.8);
        }
        .btn { 
            display: inline-block;
            margin-top: 15px;
            padding: 14px 28px;
            border: 1px solid #f9c95e;
            color: #f9c95e;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .btn:hover { 
            background: #f9c95e;
            color: #080416;
            box-shadow: 0 4px 15px rgba(249, 201, 94, 0.3);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>Próximamente</h3>
        <h1>Capítulo 2</h1>
        <p>Aún estamos construyendo esta parte de la historia. Las mejores aventuras requieren algo de paciencia y preparación.</p>
        <a class="btn" href="index.html">← Volver al Libro</a>
    </div>
</body>
</html>
