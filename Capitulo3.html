<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chio - Capítulo 3: Oxapampa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB; /* Cielo azul día soleado */
            font-family: 'Lato', sans-serif;
        }

        #scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* CIELO SOLEADO Y NUBES */
        .sky {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #51aee6 0%, #87CEEB 40%, #c4e9f7 100%);
            z-index: 1;
        }

        .sun {
            position: absolute;
            top: 10%;
            right: 15%;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff7c0 0%, #ffdf00 40%, transparent 70%);
            border-radius: 50%;
            box-shadow: 0 0 60px #ffdf00, 0 0 120px #ffdf00;
            z-index: 2;
            animation: pulse-sun 4s infinite alternate;
        }

        @keyframes pulse-sun {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            z-index: 2;
            opacity: 0.8;
            filter: blur(2px);
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }
        .cloud1 { top: 15%; left: 10%; width: 120px; height: 40px; }
        .cloud1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud1::after { width: 40px; height: 40px; top: -15px; right: 15px; }
        .cloud2 { top: 25%; right: 30%; width: 150px; height: 50px; opacity: 0.6; }
        .cloud2::before { width: 80px; height: 80px; top: -40px; left: 25px; }
        
        /* ===== MONTAÑA — esquina derecha ===== */
        .mountain {
            position: absolute;
            bottom: 30%;
            right: -120px;          /* asomada en la esquina derecha */
            width: 65vw;
            height: 46vh;
            background: radial-gradient(circle at 50% 100%, #2d5a27, #458238 60%);
            background-image:
                repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 20px, transparent 20px, transparent 40px),
                radial-gradient(circle at 50% 100%, #2d5a27, #458238 60%);
            border-radius: 50% 50% 0 0;
            z-index: 3;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
            overflow: visible;
        }
        .mountain::before {
            content: '🌿 🌿 🌿 🌿 🌿';
            position: absolute;
            top: 40%;
            left: 18%;
            font-size: 1.6rem;
            opacity: 0.3;
            letter-spacing: 40px;
        }
        .mountain::after {
            content: '🌿 🌿 🌿 🌿 🌿';
            position: absolute;
            top: 62%;
            left: 25%;
            font-size: 2.2rem;
            opacity: 0.3;
            letter-spacing: 55px;
        }

        /* Cruz PLANTADA en la montaña.
           Con border-radius 50% 50% 0 0, la superficie del arco en left:28%
           está a aproximadamente 10% de altura desde el top del elemento mountain.
           Usando top: 8% la cruz queda con su base justo en la superficie y el
           palo emerge hacia arriba, como si estuviera plantada en el suelo verde. */
        .cross {
            position: absolute;
            top: 8%;             /* justo EN la superficie del arco en este punto */
            left: 28%;
            transform: translateX(-50%) translateY(-100%); /* sube el alto completo del palo */
        }
        .cross-vertical {
            width: 8px;
            height: 50px;
            background: #3b2314;
            border-radius: 2px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .cross-horizontal {
            position: absolute;
            top: 14px;
            left: -15px;
            width: 38px;
            height: 8px;
            background: #3b2314;
            border-radius: 2px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        /* ===================================================================
           CASCADA REDISEÑADA:
           - La roca es un ACANTILADO anclado arriba a la izquierda
           - El agua fluye horizontalmente desde el borde izquierdo de la pantalla
           - Cae verticalmente desde el borde del acantilado
           - La poza está al pie del acantilado, dentro del campo
           =================================================================== */

        /* ACANTILADO / ROCA — alto, pegado al borde superior-izquierdo */
        .waterfall-rock {
            position: absolute;
            top: 12%;              /* empieza desde arriba (borde del cielo) */
            left: -20px;
            width: 200px;
            height: 55%;           /* talla suficiente para llegar al campo */
            background: linear-gradient(160deg, #7a6a5a 0%, #5a4a3b 50%, #4a3a2b 100%);
            border-radius: 0 30% 20% 0 / 0 40% 30% 0;
            z-index: 6;
            box-shadow: 6px 0 20px rgba(0,0,0,0.35), inset -10px 0 20px rgba(0,0,0,0.2);
        }
        /* Textura de roca: reflejo claro en la parte superior */
        .waterfall-rock::before {
            content: '';
            position: absolute;
            top: 8%; left: 15%;
            width: 55%; height: 20%;
            background: rgba(255,255,255,0.07);
            border-radius: 50%;
            transform: rotate(-10deg);
        }
        /* Sombra oscura en el borde derecho del acantilado */
        .waterfall-rock::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 20px; height: 100%;
            background: rgba(0,0,0,0.25);
            border-radius: 0 30% 20% 0;
        }

        /* FLUJO HORIZONTAL: agua que viene de la izquierda y llega al borde del acantilado */
        .waterfall-source {
            position: absolute;
            top: 12%;              /* al mismo nivel que la cima del acantilado */
            left: -10px;
            width: 185px;          /* llega hasta el borde del acantilado */
            height: 24px;
            background: linear-gradient(90deg,
                #6de0fa 0%,
                #87ddf5 60%,
                rgba(135, 221, 245, 0.6) 100%
            );
            border-radius: 0 0 4px 0;
            z-index: 8;
            overflow: hidden;
        }
        /* Animación de flujo horizontal */
        .waterfall-source::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 200%; height: 100%;
            background: repeating-linear-gradient(
                90deg,
                rgba(255,255,255,0.6) 0px,
                rgba(255,255,255,0.2) 10px,
                rgba(100,200,255,0.5) 14px,
                rgba(255,255,255,0.6) 24px
            );
            animation: water-flow-h 0.7s linear infinite;
        }
        .waterfall-source::after {
            content: '';
            position: absolute;
            top: 4px; left: 0;
            width: 200%; height: 10px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            animation: water-flow-h 1.1s linear infinite reverse;
        }
        @keyframes water-flow-h {
            0%   { transform: translateX(-50%); }
            100% { transform: translateX(0%); }
        }

        /* CAÍDA VERTICAL: nace en el borde del acantilado y cae hasta la poza */
        .waterfall-fall {
            position: absolute;
            top: calc(12% + 24px);   /* justo debajo del flujo horizontal */
            left: 148px;             /* en el borde derecho del acantilado */
            width: 38px;
            bottom: 26%;             /* llega hasta la poza */
            overflow: hidden;
            z-index: 7;
            border-radius: 3px;
        }
        .waterfall-fall::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 200%;
            background: repeating-linear-gradient(
                180deg,
                rgba(100,200,255,0.95) 0px,
                rgba(160,230,255,0.75) 10px,
                rgba(255,255,255,0.95) 15px,
                rgba(100,200,255,0.85) 22px,
                rgba(80,180,240,0.95) 35px
            );
            animation: waterfall-flow 0.45s linear infinite;
        }
        @keyframes waterfall-flow {
            0%   { transform: translateY(0); }
            100% { transform: translateY(50%); }
        }
        /* Brillo lateral */
        .waterfall-fall::after {
            content: '';
            position: absolute;
            top: 0; left: 5px;
            width: 8px; height: 100%;
            background: rgba(255,255,255,0.4);
            border-radius: 4px;
        }

        /* POZA al pie del acantilado */
        .waterfall-pool {
            position: absolute;
            bottom: 25%;
            left: 40px;
            width: 200px;
            height: 55px;
            background: radial-gradient(ellipse at center, #6de0fa 0%, #27a3c8 55%, #1b7ea0 100%);
            border-radius: 50%;
            z-index: 6;
            box-shadow: 0 0 30px rgba(94,214,245,0.6), inset 0 -8px 15px rgba(0,0,80,0.2);
            overflow: hidden;
        }
        .waterfall-pool::before {
            content: '';
            position: absolute;
            top: 8px; left: 50%;
            transform: translateX(-50%);
            width: 55px; height: 20px;
            background: rgba(255,255,255,0.65);
            border-radius: 50%;
            animation: foam-pulse 1.1s ease-in-out infinite alternate;
        }
        .waterfall-pool::after {
            content: '';
            position: absolute;
            top: 12px; left: 30%;
            width: 32px; height: 12px;
            background: rgba(255,255,255,0.45);
            border-radius: 50%;
            animation: foam-pulse 0.8s ease-in-out infinite alternate-reverse;
        }
        @keyframes foam-pulse {
            0%   { transform: scale(1) translateX(0); opacity: 0.7; }
            100% { transform: scale(1.2) translateX(5px); opacity: 1; }
        }

        /* Riachuelo que escapa de la poza */
        .waterfall-stream {
            position: absolute;
            bottom: 24.5%;
            left: 100px;
            width: 130px;
            height: 16px;
            background: linear-gradient(90deg, #4ec9e8, #87ddf5, #4ec9e8);
            border-radius: 10px;
            z-index: 5;
            opacity: 0.75;
        }

        /* CAMPO VERDE (SUELO) */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100vw;
            height: 40vh;
            background: #4ca13d;
            background-image: radial-gradient(#5cb84c 15%, transparent 16%), radial-gradient(#5cb84c 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            z-index: 4;
            box-shadow: inset 0 20px 20px rgba(0,0,0,0.2);
        }
        .ground::before {
            content: '🌿 🌾 🌿 🌾 🌿 🌾 🌿';
            position: absolute;
            top: 20%;
            left: 10%;
            font-size: 2.5rem;
            letter-spacing: 120px;
            opacity: 0.8;
            pointer-events: none;
        }
        .ground::after {
            content: '🌾 🌿 🌾 🌿 🌾 🌿 🌾';
            position: absolute;
            bottom: 20%;
            left: 5%;
            font-size: 3.5rem;
            letter-spacing: 150px;
            opacity: 0.9;
            pointer-events: none;
        }

        /* CABAÑA EN FORMA DE "A" — movida a la derecha para dejar espacio a la cascada */
        .cabin-container {
            position: absolute;
            bottom: 12vh;
            left: 22vw;
            width: 350px;
            height: 320px;
            z-index: 5;
        }
        /* Pared Frontal Triangular */
        .cabin-wall {
            position: absolute;
            bottom: 30px; /* para el deck */
            left: 25px;
            width: 300px;
            height: 290px;
            background: #fdfbf7;
            clip-path: polygon(50% 0, 100% 100%, 0 100%);
            z-index: 5;
        }
        /* Techo (vigas) */
        .cabin-roof-left, .cabin-roof-right {
            position: absolute;
            top: -15px;
            width: 15px;
            height: 335px;
            background: #5c3a21;
            z-index: 6;
            border-radius: 5px;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.5);
            transform-origin: top center;
        }
        .cabin-roof-left {
            left: 167px;
            transform: rotate(27.5deg);
        }
        .cabin-roof-right {
            left: 167px;
            transform: rotate(-27.5deg);
        }
        /* Viga superior del techo */
        .cabin-top-beam {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 50px;
            border-bottom: 8px solid #5c3a21;
            z-index: 7;
        }
        
        /* Puerta Verde */
        .cabin-door {
            position: absolute;
            bottom: 0px;
            right: 70px;
            width: 60px;
            height: 110px;
            background: #578c52;
            border: 4px solid #4a2e19;
            border-radius: 5px 5px 0 0;
            z-index: 6;
        }
        .door-knob {
            position: absolute;
            top: 50%;
            left: 8px;
            width: 6px;
            height: 15px;
            background: #c9933b;
            border-radius: 2px;
        }
        
        /* Ventana */
        .cabin-window {
            position: absolute;
            bottom: 30px;
            left: 70px;
            width: 70px;
            height: 70px;
            background: #ffeeb3; /* Luz cálida */
            border: 5px solid #4a2e19;
            border-radius: 3px;
            z-index: 6;
        }
        .cabin-window::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; width: 5px; height: 100%; background: #4a2e19;
            transform: translateX(-50%);
        }
        .cabin-window::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 5px; background: #4a2e19;
            transform: translateY(-50%);
        }

        /* Deck de Madera */
        .cabin-deck {
            position: absolute;
            bottom: 10px;
            left: -10px;
            width: 370px;
            height: 20px;
            background: repeating-linear-gradient(90deg, #7a4b22, #7a4b22 10px, #5c3a21 10px, #5c3a21 12px);
            border-radius: 2px;
            z-index: 6;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        
        /* Barandas */
        .deck-railing {
            position: absolute;
            bottom: 30px;
            left: 10px;
            width: 70px;
            height: 50px;
            border: 5px solid #4a2e19;
            border-right: none;
            z-index: 7;
        }
        .deck-railing::before, .deck-railing::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 60px;
            background: #4a2e19;
        }
        .deck-railing::before { transform: rotate(45deg); left: 30px; top: -10px; }
        .deck-railing::after { transform: rotate(-45deg); left: 30px; top: -10px; }

        /* Sillas (simplificadas) */
        .chair {
            position: absolute;
            bottom: 30px;
            width: 25px;
            height: 40px;
            border: 3px solid #222;
            border-radius: 4px;
            z-index: 7;
        }
        .chair.left { left: 110px; border-right: 4px solid #d4cbb8; }
        .chair.right { left: 170px; border-left: 4px solid #d4cbb8; }
        .table {
            position: absolute;
            bottom: 30px;
            left: 140px;
            width: 25px;
            height: 25px;
            background: #4a2e19;
            border-radius: 10px 10px 0 0;
            z-index: 7;
        }

        /* Luces cálidas */
        .lightbulb {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff8cc;
            border-radius: 50%;
            box-shadow: 0 0 15px 5px #ffdf00, 0 0 30px 10px #ff9e00;
            z-index: 7;
        }
        .lightbulb::before {
            content: '';
            position: absolute;
            top: -15px; left: 5px; width: 2px; height: 15px; background: #222;
        }
        .light1 { top: 90px; left: 165px; }
        .light2 { top: 110px; left: 185px; }

        /* ANIMALES DINÁMICOS */
        .animal {
            position: absolute;
            z-index: 7;
            transition: all 0.5s ease-in-out;
            cursor: pointer;
            font-size: 5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 5px 2px rgba(0,0,0,0.3));
        }
        
        .animal .sprite {
            transition: transform 0.3s ease;
            display: inline-block;
        }
        
        /* Estado pastando: los animales bajan la cabeza sin rotar */
        .animal.eating .sprite {
            transform: translateY(12px) scaleY(0.92);
        }
        
        .animal.flipped .sprite {
            transform: scaleX(-1);
        }
        .animal.flipped.eating .sprite {
            transform: scaleX(-1) translateY(12px) scaleY(0.92);
        }

        #cow { bottom: 15%; left: 40%; font-size: 6rem; }
        #horse { bottom: 25%; left: 60%; font-size: 7rem; }
        #calf { bottom: 12%; left: 45%; font-size: 4rem; }
        #hen { bottom: 8%; left: 70%; font-size: 3rem; }

        /* BOTÓN DE REGRESO */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #5c3a21;
            color: #5c3a21;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            z-index: 100;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #5c3a21;
            color: #fff;
        }

        /* TEXTO ROMÁNTICO */
        .chapter-title {
            position: absolute;
            top: 50px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .chapter-title h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: #3b2314;
            text-shadow: 2px 2px 5px rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }
        .chapter-title p {
            font-size: 1.5rem;
            color: #1c3b14;
            font-style: italic;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
        }
    </style>
</head>

<body>

    <a href="index.html" class="back-btn">Volver al Libro</a>

    <div class="chapter-title">
        <h1>Oxapampa</h1>
    </div>

    <div id="scene">
        <!-- CIELO -->
        <div class="sky"></div>
        <div class="sun"></div>
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>

        <!-- CASCADA -->
        <div class="waterfall-rock"></div>
        <div class="waterfall-source"></div>
        <div class="waterfall-fall"></div>
        <div class="waterfall-pool"></div>
        <div class="waterfall-stream"></div>

        <!-- MONTAÑA Y CRUZ -->
        <div class="mountain">
            <div class="cross">
                <div class="cross-vertical"></div>
                <div class="cross-horizontal"></div>
            </div>
        </div>

        <!-- CABAÑA -->
        <div class="cabin-container">
            <div class="cabin-wall">
                <div class="cabin-top-beam"></div>
                <div class="cabin-door"><div class="door-knob"></div></div>
                <div class="cabin-window"></div>
            </div>
            <div class="cabin-roof-left"></div>
            <div class="cabin-roof-right"></div>
            
            <div class="cabin-deck"></div>
            <div class="deck-railing"></div>
            <div class="chair left"></div>
            <div class="table"></div>
            <div class="chair right"></div>
            
            <div class="lightbulb light1"></div>
            <div class="lightbulb light2"></div>
        </div>

        <!-- CAMPO -->
        <div class="ground"></div>

        <!-- ANIMALES -->
        <div class="animal" id="cow"><div class="sprite">🐄</div></div>
        <div class="animal" id="horse"><div class="sprite">🐎</div></div>
        <div class="animal" id="calf"><div class="sprite">🐑</div></div>
        <div class="animal" id="hen"><div class="sprite">🐓</div></div>
    </div>

    <script>
        // --- LOGICA DE ANIMALITOS ---
        const animals = [
            { el: document.getElementById('cow'), speed: 0.3, width: 96, eatingProp: 0.6 },
            { el: document.getElementById('horse'), speed: 0.4, width: 112, eatingProp: 0.4 },
            { el: document.getElementById('calf'), speed: 0.35, width: 64, eatingProp: 0.5 },
            { el: document.getElementById('hen'), speed: 0.2, width: 48, eatingProp: 0.8 }
        ];
        // Cascada ocupa aprox los primeros 220px
        const WATERFALL_RIGHT = 220;
        // Cabaña: left 22vw, con deck sobresale un poco
        const CABIN_LEFT  = window.innerWidth * 0.22 - 20;
        const CABIN_RIGHT = window.innerWidth * 0.22 + 385;

        animals.forEach((animal, index) => {
            // Posiciones iniciales MUY separadas entre sí:
            // Se divide el campo libre en 4 franjas y cada animal va a una diferente
            const fieldStart = WATERFALL_RIGHT + 10;
            const fieldEnd   = window.innerWidth - 20;
            const fieldWidth = fieldEnd - fieldStart;
            const stripe     = fieldWidth / 4;  // 4 franjas

            // Cada animal empieza en su franja, con algo de aleatoriedad dentro de ella
            let stripeStart = fieldStart + index * stripe;
            let stripeEnd   = stripeStart + stripe - animal.width;
            // Evitar que la franja cruce la cabaña
            if (stripeStart < CABIN_RIGHT && stripeEnd > CABIN_LEFT) {
                stripeStart = CABIN_RIGHT + 10;
                stripeEnd   = Math.min(stripeStart + stripe, fieldEnd - animal.width);
            }
            animal.x = stripeStart + Math.random() * Math.max(0, stripeEnd - stripeStart);
            
            // El Y varía para dar profundidad (bottom entre 5% y 35%)
            animal.y = 5 + Math.random() * 30; 
            animal.el.style.bottom = animal.y + '%';
            animal.el.style.left = animal.x + 'px';
            animal.direction = Math.random() > 0.5 ? 1 : -1; // 1 = derecha, -1 = izquierda
            if (animal.direction === -1) animal.el.classList.add('flipped');
            animal.state = 'walking'; // walking, eating, idle
            animal.stateTimer = 0;
            
            // Loop de animación por frame (ligero)
            setInterval(() => {
                animal.stateTimer -= 100;
                
                if(animal.stateTimer <= 0) {
                    // Cambiar de estado
                    let rand = Math.random();
                    if(rand < animal.eatingProp) {
                        animal.state = 'eating';
                        animal.el.classList.add('eating');
                        animal.stateTimer = 3000 + Math.random() * 4000;
                    } else if (rand < 0.8) {
                        animal.state = 'walking';
                        animal.el.classList.remove('eating');
                        // a veces cambia direccion
                        if(Math.random() < 0.3) {
                            animal.direction *= -1;
                            animal.el.classList.toggle('flipped');
                        }
                        animal.stateTimer = 4000 + Math.random() * 5000;
                    } else {
                        animal.state = 'idle';
                        animal.el.classList.remove('eating');
                        animal.stateTimer = 2000 + Math.random() * 3000;
                    }
                }

                if (animal.state === 'walking') {
                    let newX = animal.x + animal.speed * animal.direction;

                    // Rebote contra la cascada (límite izquierdo)
                    if (newX < WATERFALL_RIGHT) {
                        newX = WATERFALL_RIGHT;
                        animal.direction = 1;
                        animal.el.classList.remove('flipped');
                    }
                    // Rebote contra la cabaña
                    if (newX + animal.width > CABIN_LEFT && newX < CABIN_RIGHT) {
                        if (animal.direction === 1) {
                            newX = CABIN_LEFT - animal.width;
                            animal.direction = -1;
                            animal.el.classList.add('flipped');
                        } else {
                            newX = CABIN_RIGHT;
                            animal.direction = 1;
                            animal.el.classList.remove('flipped');
                        }
                    }
                    // Rebote en borde derecho
                    if (newX > window.innerWidth - animal.width) {
                        newX = window.innerWidth - animal.width;
                        animal.direction = -1;
                        animal.el.classList.add('flipped');
                    }

                    animal.x = newX;
                    animal.el.style.left = animal.x + 'px';
                }
            }, 100);
            
            // Interactividad: al dar click, que salten un poquito
            animal.el.addEventListener('click', () => {
                animal.el.style.transform = 'translateY(-20px)';
                setTimeout(() => {
                    animal.el.style.transform = '';
                }, 300);
            });
        });
    </script>
</body>

</html>
